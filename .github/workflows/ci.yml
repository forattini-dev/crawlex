name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy default features
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy all features
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  build-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - name: build crawlex (full, HTTP + render)
        run: cargo build --bin crawlex --all-features

  build-mini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - name: build crawlex-mini (HTTP-only, no browser deps)
        run: cargo build --bin crawlex-mini --no-default-features --features cli,sqlite

  package:
    name: cargo publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang
      - name: Verify Cargo.toml + package.json version match
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(awk -F'"' '/^\[package\]/{p=1} p && /^version = /{print $2; exit}' Cargo.toml)
          if [[ "$PKG" != "$CARGO" ]]; then
            echo "::error::package.json ($PKG) != Cargo.toml ($CARGO)"; exit 1
          fi
          echo "version=$CARGO"
      - name: cargo publish --dry-run
        run: cargo publish --dry-run --locked
